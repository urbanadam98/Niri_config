# ─── Font ────────────────────────────────────────────────────────────────────
font_family      Hack Nerd Font
bold_font        Hack Nerd Font Bold
italic_font      Hack Nerd Font Italic
bold_italic_font Hack Nerd Font Bold Italic
font_size        12.0

# ─── Průhlednost ─────────────────────────────────────────────────────────────
background_opacity 0.85
dynamic_background_opacity yes

# Klávesy pro změnu průhlednosti za běhu
map ctrl+shift+a set_background_opacity +0.05
map ctrl+shift+d set_background_opacity -0.05
map ctrl+shift+s set_background_opacity 1.0

# ─── Dracula téma ────────────────────────────────────────────────────────────
foreground            #f8f8f2
background            #282a36
selection_foreground  #ffffff
selection_background  #44475a

color0  #21222c
color1  #ff5555
color2  #50fa7b
color3  #f1fa8c
color4  #bd93f9
color5  #ff79c6
color6  #8be9fd
color7  #f8f8f2
color8  #6272a4
color9  #ff6e6e
color10 #69ff94
color11 #ffffa5
color12 #d6acff
color13 #ff92df
color14 #a4ffff
color15 #ffffff

# Kurzor
cursor            #f8f8f2
cursor_text_color #282a36

# URL barva
url_color #8be9fd

# ─── Okno ────────────────────────────────────────────────────────────────────
window_padding_width 8
confirm_os_window_close 0
hide_window_decorations no
remember_window_size  yes

# ─── Taby ────────────────────────────────────────────────────────────────────
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
active_tab_foreground   #282a36
active_tab_background   #bd93f9
active_tab_font_style   bold
inactive_tab_foreground #f8f8f2
inactive_tab_background #44475a

# ─── Klávesové zkratky ───────────────────────────────────────────────────────
# Taby
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

# Split panely
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# Kopírování / vkládání
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Zvětšení / zmenšení fontu
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0

# ─── Výkon ───────────────────────────────────────────────────────────────────
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ─── Shell integrace ─────────────────────────────────────────────────────────
shell_integration enabled
